version: '3.8'

services:
  spacecinema-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spacecinema-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist database
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Healthcheck (optional)
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f tg.py || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
